name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CLIENT
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: CLIENT/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SERVER
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: SERVER/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: node --test --import tsx ./tests/app.test.ts
